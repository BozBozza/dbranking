<!DOCTYPE html>
<html>
<head>
    <title>Character Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 style="text-align:center">Dragon Ball All Power Levels</h1>

<a href="multipliers.html" class="button-link">Multipliers</a><br></br>

<a href="dbheroes.html" class="button-link">Dragon Ball Heroes</a><br></br>

<div id="saga-filter-menu"></div>

<div id="character-filter-menu"></div>

<div id="character-container"></div>


<script>
    let allCharacters = [];

    async function loadCharacters() {
        try {
            const response = await fetch('powerlevels.json');
            allCharacters = await response.json();
            createSagaFilterMenu();
            renderDisplay(allCharacters);
        } catch (error) {
            console.error("Error loading characters:", error);
        }
    }

    function createSagaFilterMenu() {
        const menu = document.getElementById('saga-filter-menu');
        const orderedCategories = [
            'Shadow Dragon Saga',
            'Super 17 Saga',
            'Baby Saga',
            'Black Star Dragonball Saga',
            'End of Z Saga',
            'Superhero Movie',
            'Granolah Saga',
            'Galactic Patrol Saga',
            'Broly Movie',
            'Tournament of Power Saga',
            'Future Trunks Saga',
            'Universe 6 Tournament Saga',
            'Resurrection F Saga',
            'Battle of Gods Saga',
            'Daima Saga',
            'Wrath of the Dragon',
            'Fusion Saga',
            'Buu Saga',
            'Broly - Second Coming',
            'Bojack Unbound',
            'Other World Tournament Saga',
            'Cell Games Saga',
            'Plan to Eradicate The Saiyans',
            'Broly The Legendary Super Saiyan',
            'Super Android 13',
            'The Return of Cooler',
            'Cell Saga',
            'Android Saga',
            'Coolers Revenge',
            'Trunks Saga',
            'The History of Trunks',
            'Garlic Jr Saga',
            'Frieza Saga',
            'Lord Slug',
            'Namek Saga',
            'The Tree of Might',
            'The Worlds Strongest',
            'Saiyan Saga',
            'Raditz Saga',
            'Dead Zone',
            'Piccolo Jr Saga',
            'King Piccolo Saga',
            'Tien Shinhan Saga',
            'Fortuneteller Baba Saga',
            'Red Ribbon Army Saga',
            'Tournament Saga',
            'Emperor Pilaf Saga',
            'Bardock - The Father of Goku',
        ]
        let menuHTML = `<button class="filter-btn" onclick="filterData('all')">Show All</button>`;
        menuHTML += orderedCategories.map(cat => `
            <button class="filter-btn" onclick="filterData('${cat}')">${cat}</button>
        `).join('');
        menu.innerHTML = menuHTML;
    }

    function filterData(category) {
        if (category === 'all') {
            renderDisplay(allCharacters);
        } else {
            const filtered = allCharacters.filter(char => char.info === category);
            renderDisplay(filtered);
        }
    }

    function renderDisplay(dataToShow) {
        const container = document.getElementById('character-container');

        container.innerHTML = dataToShow.map(char => `
            <div class="character-card" style="border:3px solid ${char.border};">
                <span class="powerlevel">${char.powerlevel}</span>
                <img src="${char.image}" style="border:3px solid ${char.border};">
                <h2>${char.name}</h2>
                <p>${char.form}</p>
                <p>${char.info}</p>
            </div>
        `).join('');
    }

    loadCharacters();
</script>
</body>
