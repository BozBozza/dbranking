<!DOCTYPE html>
<html>
<head>
    <title>Character Rankings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS to handle the full-screen horizontal layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Hide scrollbars */
            background-color: #111; /* Dark background looks great for full-screen showcases */
            font-family: Arial, sans-serif;
        }

        #character-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* JavaScript will handle the scrolling movement */
            white-space: nowrap;
        }

        .character-card {
            flex: 0 0 100%; /* Forces each card to be exactly 100% of the screen width */
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Adjusting your existing elements to look great at full screen */
        .character-card img {
            max-h
</head>
<body>

<div id="character-container"></div>

<script>
    let allCharacters = [];
    const container = document.getElementById('character-container');
    
    // ADJUST SPEED HERE: Higher number = faster scroll, Lower number = slower scroll
    const scrollSpeed = 2; 

    async function loadCharacters() {
        try {
            const response = await fetch('powerlevels.json');
            allCharacters = await response.json();
            renderDisplay(allCharacters);
            startInfiniteScroll();
        } catch (error) {
            console.error("Error loading characters:", error);
        }
    }

    function renderDisplay(dataToShow) {
        container.innerHTML = dataToShow.map(char => `
            <div class="character-card" style="border: 10px solid ${char.border || '#fff'};">
                <span class="powerlevel" style="color: ${char.border || '#fff'}">${char.powerlevel}</span>
                <img src="${char.image}" style="border: 5px solid ${char.border || '#fff'};">
                <h2>${char.name}</h2>
                <h3>${char.form}</h3>
                <p>${char.info}</p>
            </div>
        `).join('');
    }

    function startInfiniteScroll() {
        function scroll() {
            // Move the container to the left
            container.scrollLeft += scrollSpeed;

            // If it reaches the end of the scroll width, reset back to 0 (the beginning)
            // We subtract container.clientWidth to account for the viewport width
            if (container.scrollLeft >= (container.scrollWidth - container.clientWidth)) {
                container.scrollLeft = 0;
            }

            // Calls the function smoothly on every animation frame
            requestAnimationFrame(scroll);
        }
        
        // Start the loop
        requestAnimationFrame(scroll);
    }

    loadCharacters();
</script>
</body>
</html>
