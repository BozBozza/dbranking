<!DOCTYPE html>
<html>
<head>
    <title>Character Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 style="text-align:center">Dragon Ball All Power Levels (SSJ 4 and SSJ Blue Multiplier 4 Million times base)</h1>

<div id="character-container"></div>

<script>
    async function loadCharacters() {
        try {
            // Fetch the JSON file
            const response = await fetch('data_test.json');
            const characters = await response.json();

            const container = document.getElementById('character-container');

            // Map the data into HTML strings
            container.innerHTML = characters.map(char => `
                    <div class="character-card" style="border:3px solid ${char.border};">
                    <span class="powerlevel">${char.powerlevel}</span>
                        <img src="${char.image}" style="border:3px solid ${char.border};">
                        <h2>${char.name}</h2>
                        <p>${char.form}</p>
                        <p>${char.info}</p>
                    </div>
                `).join('');

        } catch (error) {
            console.error("Error loading characters:", error);
        }
    }

    // Run the function
    loadCharacters();
</script>
</body>
</html>
